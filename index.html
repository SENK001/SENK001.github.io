<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./senk.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SENK的个人主页</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .page {
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }
      .page h1 {
        font-size: 4rem;
        font-weight: 600;
      }
      .page p {
        font-size: 2rem;
        font-weight: 400;
      }

      .floating-left {
        animation: floating-left 2s ease-in-out;
      }
      /*元素向左浮动出现的动画*/
      @keyframes floating-left {
        0% {
          transform: translateX(6rem);
          opacity: 0;
        }
        100% {
          transform: translateX(0);
          opacity: 1;
        }
      }
      button {
        padding: 10px;
        background-color: #0000005e;
        border: 0;
        cursor: pointer;
        outline: none;
        border-radius: 50%;
        position: fixed;
        bottom: 20px;
        right: calc(50% - 26px);
        transform: translateY(-50%);
        transition: all 0.3s;
      }
      button:hover {
        background-color: #0000009e;
      }
      .copyright {
        position: absolute;
        bottom: 10px;
        color: #fff;
        text-align: center;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="page" id="page1">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        xmlns:xlink="http://www.w3.org/1999/xlink"
        width="300"
        height="400"
        viewBox="80 50 250 300"
        stroke="#ffffff"
      >
        <polyline
          fill="none"
          stroke-width="24"
          stroke-linecap="round"
          points="200,80 200,330"
        />
        <polyline
          fill="none"
          stroke-width="24"
          stroke-linecap="round"
          stroke-linejoin="round"
          points="100,150 100,250 300,150"
        />
        <polyline
          fill="none"
          stroke-width="24"
          stroke-linecap="round"
          points="200,200 300,250"
        />
      </svg>
      <h1>SENK的个人主页</h1>
      <p>欢迎来到我的个人主页</p>
    </div>
    <div class="page" id="page2"><p>我的名字是Senk</p></div>
    <div class="page" id="page3"><p>我的爱好是编程</p></div>
    <div class="copyright">
      <p>渝ICP备2022011789号-1</p>
      <p>&copy;SENK 2023 版权所有</p>
    </div>
    <button>
      <svg
        t="1691944442248"
        class="icon"
        viewBox="0 0 1024 1024"
        version="1.1"
        xmlns="http://www.w3.org/2000/svg"
        p-id="4831"
        width="48"
        height="48"
      >
        <path
          d="M856.84419 557.348571l-293.059047 293.059048-51.736381 51.736381-51.712-51.712L167.253333 557.348571l51.712-51.712 256.512 256.463239V121.856h73.142857v640.24381l256.512-256.48762 51.712 51.736381z"
          p-id="4832"
          fill="#ffffff"
        ></path>
      </svg>
    </button>
    <script>
      function randColor() {
        var r = Math.floor(Math.random() * 256);
        var g = Math.floor(Math.random() * 256);
        var b = Math.floor(Math.random() * 256);
        return "rgb(" + r + "," + g + "," + b + ")";
      }
      function gettextColor(color) {
        var r = parseInt(color.substring(4, 5));
        var g = parseInt(color.substring(2, 3));
        var b = parseInt(color.substring(0, 1));
        if (r * 0.299 + g * 0.587 + b * 0.114 > 186) {
          return "#000000";
        } else {
          return "#ffffff";
        }
      }
      const pages = document.querySelectorAll(".page");
      pages.forEach((element) => {
        element.style.backgroundColor = randColor();
        element.style.color = gettextColor(element.style.backgroundColor);
        //当滚动到page时添加floating-left动画
        window.onscroll = () => {
          if (window.scrollY > element.offsetTop - window.clientHeight / 2) {
            element.classList.add("floating-left");
          } else {
            element.classList.remove("floating-left");
          }
        };
      });
      const button = document.querySelector("button");
      button.addEventListener("click", () => {
        //滚轮滚动一个page的高度
        window.scrollBy({
          top: document.querySelector(".page").offsetHeight,
          behavior: "smooth",
        });
      });
      //当滚动到页面底部时button消失
      window.onscroll = () => {
        if (window.scrollY + window.innerHeight >= document.body.offsetHeight) {
          button.style.display = "none";
        } else {
          button.style.display = "block";
        }
      };
    </script>
  </body>
</html>
